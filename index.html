<!DOCTYPE html>
<html lang="pt-BR">

<body>
<div class="app-container" id="appRoot"></div>

<script>
    // ==================== BANCO DE DADOS POR USUARIO ====================
    function initDB() {
        if (!localStorage.getItem("db_usuarios")) {
            localStorage.setItem("db_usuarios", JSON.stringify([]));
        }
    }
    
    function getUsuarios() {
        return JSON.parse(localStorage.getItem("db_usuarios"));
    }
    
    function addUsuario(nome) {
        let usuarios = getUsuarios();
        if (usuarios.includes(nome)) return false;
        usuarios.push(nome);
        localStorage.setItem("db_usuarios", JSON.stringify(usuarios));
        
        if (!localStorage.getItem(`db_records_${nome}`)) {
            localStorage.setItem(`db_records_${nome}`, JSON.stringify([]));
        }
        if (!localStorage.getItem(`db_passwords_${nome}`)) {
            localStorage.setItem(`db_passwords_${nome}`, JSON.stringify({}));
        }
        return true;
    }
    
    function usuarioExiste(nome) {
        return getUsuarios().includes(nome);
    }
    
    function getDatabaseRecords(usuario) {
        return JSON.parse(localStorage.getItem(`db_records_${usuario}`) || "[]");
    }
    
    function saveDatabaseRecords(usuario, records) {
        localStorage.setItem(`db_records_${usuario}`, JSON.stringify(records));
    }
    
    function getRecordPasswords(usuario) {
        return JSON.parse(localStorage.getItem(`db_passwords_${usuario}`) || "{}");
    }
    
    function saveRecordPasswords(usuario, passwords) {
        localStorage.setItem(`db_passwords_${usuario}`, JSON.stringify(passwords));
    }
    
    function setRecordPassword(usuario, recordName, password) {
        const passwords = getRecordPasswords(usuario);
        passwords[recordName] = password;
        saveRecordPasswords(usuario, passwords);
    }
    
    function verifyRecordPassword(usuario, recordName, password) {
        const passwords = getRecordPasswords(usuario);
        return passwords[recordName] === password;
    }
    
    function hasRecordPassword(usuario, recordName) {
        const passwords = getRecordPasswords(usuario);
        return !!passwords[recordName];
    }
    
    function addDatabaseRecord(usuario, record) {
        let records = getDatabaseRecords(usuario);
        if (records.find(r => r.nomeCompleto.toLowerCase() === record.nomeCompleto.toLowerCase())) {
            return { success: false, message: "[ERRO] REGISTRO JA EXISTE" };
        }
        records.push(record);
        saveDatabaseRecords(usuario, records);
        return { success: true, message: "[OK] REGISTRO ADICIONADO" };
    }
    
    function updateDatabaseRecord(usuario, nomeOriginal, novosDados) {
        let records = getDatabaseRecords(usuario);
        const index = records.findIndex(r => r.nomeCompleto === nomeOriginal);
        if (index !== -1) {
            const oldName = records[index].nomeCompleto;
            const newName = novosDados.nomeCompleto;
            
            if (oldName !== newName) {
                const passwords = getRecordPasswords(usuario);
                if (passwords[oldName]) {
                    passwords[newName] = passwords[oldName];
                    delete passwords[oldName];
                    saveRecordPasswords(usuario, passwords);
                }
            }
            records[index] = { ...records[index], ...novosDados };
            saveDatabaseRecords(usuario, records);
            return true;
        }
        return false;
    }
    
    function deleteDatabaseRecord(usuario, recordName) {
        let records = getDatabaseRecords(usuario);
        const newRecords = records.filter(r => r.nomeCompleto !== recordName);
        if (newRecords.length === records.length) return false;
        saveDatabaseRecords(usuario, newRecords);
        
        const passwords = getRecordPasswords(usuario);
        if (passwords[recordName]) {
            delete passwords[recordName];
            saveRecordPasswords(usuario, passwords);
        }
        return true;
    }
    
    // ==================== FUNCOES DE FORMATACAO ====================
    function formatarCPF(valor) {
        valor = valor.replace(/\D/g, '');
        if (valor.length <= 3) return valor;
        if (valor.length <= 6) return valor.replace(/(\d{3})(\d+)/, '$1.$2');
        if (valor.length <= 9) return valor.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
        return valor.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, '$1.$2.$3-$4').substring(0, 14);
    }
    
    function formatarCNPJ(valor) {
        valor = valor.replace(/\D/g, '');
        if (valor.length <= 2) return valor;
        if (valor.length <= 5) return valor.replace(/(\d{2})(\d+)/, '$1.$2');
        if (valor.length <= 8) return valor.replace(/(\d{2})(\d{3})(\d+)/, '$1.$2.$3');
        if (valor.length <= 12) return valor.replace(/(\d{2})(\d{3})(\d{3})(\d+)/, '$1.$2.$3/$4');
        return valor.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d+)/, '$1.$2.$3/$4-$5').substring(0, 18);
    }
    
    function formatarCEP(valor) {
        valor = valor.replace(/\D/g, '');
        if (valor.length <= 5) return valor;
        return valor.replace(/(\d{5})(\d+)/, '$1-$2').substring(0, 9);
    }
    
    function formatarTelefone(valor) {
        valor = valor.replace(/\D/g, '');
        if (valor.length <= 2) return valor;
        if (valor.length <= 6) return valor.replace(/(\d{2})(\d+)/, '($1) $2');
        if (valor.length <= 10) return valor.replace(/(\d{2})(\d{4})(\d+)/, '($1) $2-$3');
        return valor.replace(/(\d{2})(\d{5})(\d+)/, '($1) $2-$3').substring(0, 15);
    }
    
    // ==================== EXPORT E IMPORT ====================
    function exportDatabase() {
        const usuarios = getUsuarios();
        const exportData = {};
        
        for (const usuario of usuarios) {
            exportData[usuario] = {
                records: getDatabaseRecords(usuario),
                passwords: getRecordPasswords(usuario)
            };
        }
        
        const dataStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const data = new Date();
        const timestamp = `${data.getFullYear()}-${String(data.getMonth()+1).padStart(2,'0')}-${String(data.getDate()).padStart(2,'0')}_${String(data.getHours()).padStart(2,'0')}-${String(data.getMinutes()).padStart(2,'0')}-${String(data.getSeconds()).padStart(2,'0')}`;
        a.download = `hacker_db_backup_${timestamp}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showMsgTemporary("[OK] BANCO DE DADOS EXPORTADO COM SUCESSO! Arquivo salvo na pasta Downloads", "success");
    }
    
    function importDatabase(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                const usuariosAtuais = getUsuarios();
                
                let importCount = 0;
                let duplicateCount = 0;
                let userCount = 0;
                
                for (const [usuario, data] of Object.entries(importedData)) {
                    if (data.records && Array.isArray(data.records)) {
                        if (!usuarioExiste(usuario)) {
                            addUsuario(usuario);
                            userCount++;
                        }
                        
                        const recordsExistentes = getDatabaseRecords(usuario);
                        const novosRecords = [];
                        
                        for (const record of data.records) {
                            const existe = recordsExistentes.some(r => r.nomeCompleto === record.nomeCompleto);
                            if (!existe) {
                                novosRecords.push(record);
                                importCount++;
                            } else {
                                duplicateCount++;
                            }
                        }
                        
                        if (novosRecords.length > 0) {
                            const allRecords = [...recordsExistentes, ...novosRecords];
                            saveDatabaseRecords(usuario, allRecords);
                        }
                        
                        if (data.passwords) {
                            const passwordsExistentes = getRecordPasswords(usuario);
                            const novasPasswords = { ...passwordsExistentes };
                            for (const [key, value] of Object.entries(data.passwords)) {
                                if (!passwordsExistentes[key]) {
                                    novasPasswords[key] = value;
                                }
                            }
                            saveRecordPasswords(usuario, novasPasswords);
                        }
                    }
                }
                
                let msg = `[OK] IMPORTACAO CONCLUIDA! ${importCount} registros importados.`;
                if (userCount > 0) msg += ` ${userCount} novos usuarios.`;
                if (duplicateCount > 0) msg += ` ${duplicateCount} registros duplicados ignorados.`;
                showMsgTemporary(msg, "success");
                
                if (loggedUser) {
                    renderMainApp();
                }
            } catch (error) {
                showMsgTemporary("[ERRO] ARQUIVO INVALIDO OU CORROMPIDO", "error");
            }
        };
        reader.readAsText(file);
    }
    
    // ==================== ESTADOS ====================
    let currentView = "login";
    let loggedUser = null;
    
    const root = document.getElementById("appRoot");
    
    function getAsciiHeader() {
        return `
        <div class="ascii-header">
  ██╗  ██╗ █████╗  ██████╗██╗  ██╗███████╗██████╗ 
  ██║  ██║██╔══██╗██╔════╝██║ ██╔╝██╔════╝██╔══██╗
  ███████║███████║██║     █████╔╝ █████╗  ██████╔╝
  ██╔══██║██╔══██║██║     ██╔═██╗ ██╔══╝  ██╔══██╗
  ██║  ██║██║  ██║╚██████╗██║  ██╗███████╗██║  ██║
  ╚═╝  ╚═╝╚═╝  ╚═╝ ╚═════╝╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝
        </div>
        <div style="text-align:center; margin-bottom:15px;">
[ DATABASE v3.0 ] - [ SISTEMA DE ARQUIVOS ]
        </div>
        `;
    }
    
    function render() {
        if (currentView === "login") {
            renderLogin();
        } else if (currentView === "mainApp") {
            renderMainApp();
        } else if (currentView === "visualizar") {
            renderVisualizar();
        } else if (currentView === "editar") {
            renderEditar();
        }
    }
    
    function renderLogin() {
        root.innerHTML = `
            ${getAsciiHeader()}
            <div class="card">
                <h2>> ACESSO AO SISTEMA</h2>
                <input type="text" id="loginNome" placeholder="NOME DE USUARIO" autocomplete="off">
                <button id="btnEntrar">[ ENTRAR ]</button>
                <div id="loginMsg" class="error-msg" style="display:none;"></div>
                <hr>
                <div class="button-group">
                    <button id="btnExportLogin" class="btn-warning">[ EXPORTAR BACKUP ]</button>
                    <button id="btnImportLogin" class="btn-secondary">[ IMPORTAR BACKUP ]</button>
                </div>
                <small>DIGITE SEU NOME PARA ENTRAR. SE FOR NOVO, UMA CONTA SERA CRIADA.</small>
                <small>EXPORTAR: FAZ BACKUP DE TODOS OS DADOS DO SISTEMA (salva na pasta Downloads)</small>
                <small>IMPORTAR: RESTAURA DADOS (NAO DUPLICA REGISTROS)</small>
            </div>
        `;
        
        document.getElementById("btnEntrar").addEventListener("click", () => {
            const nome = document.getElementById("loginNome").value.trim();
            const msgDiv = document.getElementById("loginMsg");
            
            if (!nome) {
                msgDiv.style.display = "block";
                msgDiv.innerText = "[ERRO] DIGITE UM NOME DE USUARIO";
                return;
            }
            
            if (!usuarioExiste(nome)) {
                addUsuario(nome);
                msgDiv.classList.remove("error-msg");
                msgDiv.classList.add("success-msg");
                msgDiv.style.display = "block";
                msgDiv.innerText = "[OK] CONTA CRIADA! BEM-VINDO, " + nome.toUpperCase();
                setTimeout(() => {
                    loggedUser = { nome: nome };
                    currentView = "mainApp";
                    render();
                }, 1000);
            } else {
                loggedUser = { nome: nome };
                currentView = "mainApp";
                render();
            }
        });
        
        document.getElementById("btnExportLogin").addEventListener("click", () => {
            exportDatabase();
        });
        
        document.getElementById("btnImportLogin").addEventListener("click", () => {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".json";
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    importDatabase(e.target.files[0]);
                }
            };
            input.click();
        });
    }
    
    function renderMainApp() {
        if (!loggedUser) {
            currentView = "login";
            render();
            return;
        }
        
        root.innerHTML = `
            ${getAsciiHeader()}
            <div class="user-name">[ ${loggedUser.nome.toUpperCase()} ]</div>
            <div class="card">
                <div class="button-group">
                    <button id="btnVisualizar">[ VISUALIZAR ]</button>
                    <button id="btnEditar" class="btn-secondary">[ EDITAR ]</button>
                </div>
                <div class="button-group" style="margin-top:10px;">
                    <button id="btnExport" class="btn-warning">[ EXPORTAR BACKUP ]</button>
                    <button id="btnImport" class="btn-secondary">[ IMPORTAR BACKUP ]</button>
                </div>
                <button id="btnLogout" class="btn-danger">[ SAIR ]</button>
            </div>
            <small style="display:block; text-align:center; margin-top:10px;">* BACKUP salva todos os dados do sistema na pasta Downloads</small>
        `;
        
        document.getElementById("btnVisualizar").addEventListener("click", () => {
            currentView = "visualizar";
            render();
        });
        document.getElementById("btnEditar").addEventListener("click", () => {
            currentView = "editar";
            render();
        });
        document.getElementById("btnExport").addEventListener("click", () => {
            exportDatabase();
        });
        document.getElementById("btnImport").addEventListener("click", () => {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".json";
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    importDatabase(e.target.files[0]);
                }
            };
            input.click();
        });
        document.getElementById("btnLogout").addEventListener("click", () => {
            loggedUser = null;
            currentView = "login";
            render();
        });
    }
    
    function renderVisualizar() {
        if (!loggedUser) return;
        let records = getDatabaseRecords(loggedUser.nome);
        
        function filterRecords(searchTerm) {
            if (!searchTerm) return records;
            return records.filter(r => r.nomeCompleto.toLowerCase().includes(searchTerm.toLowerCase()));
        }
        
        function refreshList(searchTerm = "") {
            const filtered = filterRecords(searchTerm);
            const container = document.getElementById("recordsList");
            if (!container) return;
            if (filtered.length === 0) {
                container.innerHTML = `<div class="error-msg">[ NENHUM REGISTRO ENCONTRADO ]</div>`;
                return;
            }
            container.innerHTML = filtered.map(rec => `
                <div class="data-row">
                    <strong>> ${escapeHtml(rec.nomeCompleto)}</strong><br>
                    [DATA] ${escapeHtml(rec.dataNascimento || "---")} | [CPF] ${escapeHtml(rec.cpf || "---")}<br>
                    [TEL] ${escapeHtml(rec.telefone || "---")} | [EMAIL] ${escapeHtml(rec.gmail || "---")}<br>
                    [END] ${escapeHtml(rec.rua || "---")}, ${escapeHtml(rec.numeroCasa || "---")}<br>
                    [CEP] ${escapeHtml(rec.cep || "---")} | [CNPJ] ${escapeHtml(rec.cnpj || "---")}
                </div>
            `).join("");
        }
        
        root.innerHTML = `
            ${getAsciiHeader()}
            <div>
                <button id="backMain" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> REGISTROS DO BANCO</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="PESQUISAR POR NOME...">
                    <button id="searchBtn">[ BUSCAR ]</button>
                </div>
                <div id="recordsList"></div>
            </div>
        `;
        
        refreshList("");
        document.getElementById("searchBtn").addEventListener("click", () => {
            refreshList(document.getElementById("searchInput").value);
        });
        document.getElementById("backMain").addEventListener("click", () => {
            currentView = "mainApp";
            render();
        });
    }
    
    function renderEditar() {
        if (!loggedUser) return;
        
        root.innerHTML = `
            ${getAsciiHeader()}
            <div>
                <button id="backToMain" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> GERENCIAR REGISTROS</h2>
                
                <div class="card">
                    <h3>[ NOVO REGISTRO ]</h3>
                    <input type="text" id="newNome" placeholder="NOME COMPLETO *">
                    <input type="date" id="newDataNasc" placeholder="DATA NASC">
                    <input type="text" id="newCpf" placeholder="CPF" maxlength="14" oninput="this.value = window.formatarCPF(this.value)">
                    <input type="text" id="newCep" placeholder="CEP" maxlength="9" oninput="this.value = window.formatarCEP(this.value)">
                    <input type="text" id="newCnpj" placeholder="CNPJ" maxlength="18" oninput="this.value = window.formatarCNPJ(this.value)">
                    <input type="text" id="newRua" placeholder="RUA">
                    <input type="text" id="newNumero" placeholder="NUMERO">
                    <input type="text" id="newTelefone" placeholder="TELEFONE" maxlength="15" oninput="this.value = window.formatarTelefone(this.value)">
                    <input type="email" id="newGmail" placeholder="GMAIL">
                    <button id="btnAddRecord" class="btn-success">[ SALVAR ]</button>
                    <div id="addMsg" style="display:none;"></div>
                </div>
                
                <div class="card">
                    <h3>[ REGISTROS EXISTENTES ]</h3>
                    <div class="search-bar">
                        <input type="text" id="searchRecordInput" placeholder="PESQUISAR...">
                        <button id="searchRecordBtn">[ BUSCAR ]</button>
                    </div>
                    <div id="searchResults"></div>
                </div>
            </div>
        `;
        
        window.formatarCPF = formatarCPF;
        window.formatarCEP = formatarCEP;
        window.formatarCNPJ = formatarCNPJ;
        window.formatarTelefone = formatarTelefone;
        
        let currentRecords = getDatabaseRecords(loggedUser.nome);
        
        document.getElementById("btnAddRecord").addEventListener("click", () => {
            const nomeCompleto = document.getElementById("newNome").value.trim();
            if (!nomeCompleto) {
                showMsg("addMsg", "[ERRO] NOME OBRIGATORIO", "error");
                return;
            }
            
            const newRecord = {
                nomeCompleto: nomeCompleto,
                dataNascimento: document.getElementById("newDataNasc").value,
                cpf: document.getElementById("newCpf").value,
                cep: document.getElementById("newCep").value,
                cnpj: document.getElementById("newCnpj").value,
                rua: document.getElementById("newRua").value,
                numeroCasa: document.getElementById("newNumero").value,
                telefone: document.getElementById("newTelefone").value,
                gmail: document.getElementById("newGmail").value
            };
            
            const result = addDatabaseRecord(loggedUser.nome, newRecord);
            if (result.success) {
                showMsg("addMsg", result.message, "success");
                document.querySelectorAll("#newDataNasc, #newCpf, #newCep, #newCnpj, #newRua, #newNumero, #newTelefone, #newGmail").forEach(input => {
                    input.value = "";
                });
                document.getElementById("newNome").value = "";
                currentRecords = getDatabaseRecords(loggedUser.nome);
                searchRecords(currentRecords);
            } else {
                showMsg("addMsg", result.message, "error");
            }
        });
        
        function searchRecords(recordsToSearch) {
            const searchTerm = document.getElementById("searchRecordInput")?.value.trim().toLowerCase() || "";
            let filtered = recordsToSearch;
            if (searchTerm) {
                filtered = recordsToSearch.filter(r => r.nomeCompleto.toLowerCase().includes(searchTerm));
            }
            
            const resultsDiv = document.getElementById("searchResults");
            if (!resultsDiv) return;
            
            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div class="error-msg">[ NENHUM REGISTRO ENCONTRADO ]</div>';
                return;
            }
            
            resultsDiv.innerHTML = filtered.map(rec => `
                <div class="data-row">
                    <strong>> ${escapeHtml(rec.nomeCompleto)}</strong><br>
                    [DATA] ${escapeHtml(rec.dataNascimento || "---")} | [CPF] ${escapeHtml(rec.cpf || "---")}
                    <div class="inline-buttons">
                        <button class="edit-record" data-nome="${escapeHtml(rec.nomeCompleto)}">[ EDITAR ]</button>
                        <button class="delete-record" data-nome="${escapeHtml(rec.nomeCompleto)}">[ EXCLUIR ]</button>
                    </div>
                </div>
            `).join("");
            
            document.querySelectorAll(".edit-record").forEach(btn => {
                btn.addEventListener("click", () => {
                    const nome = btn.getAttribute("data-nome");
                    promptEditPassword(nome);
                });
            });
            
            document.querySelectorAll(".delete-record").forEach(btn => {
                btn.addEventListener("click", () => {
                    const nome = btn.getAttribute("data-nome");
                    promptDeleteRecord(nome);
                });
            });
        }
        
        function promptDeleteRecord(recordName) {
            const modal = document.createElement("div");
            modal.className = "modal";
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>> CONFIRMAR EXCLUSAO</h3>
                    <p>TEM CERTEZA QUE DESEJA EXCLUIR O REGISTRO:</p>
                    <p><strong>${escapeHtml(recordName)}</strong>?</p>
                    <div class="inline-buttons">
                        <button id="confirmDelete" class="btn-danger">[ EXCLUIR ]</button>
                        <button id="cancelDelete" class="btn-secondary">[ CANCELAR ]</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById("confirmDelete").addEventListener("click", () => {
                deleteDatabaseRecord(loggedUser.nome, recordName);
                modal.remove();
                currentRecords = getDatabaseRecords(loggedUser.nome);
                searchRecords(currentRecords);
                showMsgTemporary("[OK] REGISTRO EXCLUIDO", "success");
            });
            
            document.getElementById("cancelDelete").addEventListener("click", () => {
                modal.remove();
            });
        }
        
        function searchRecordsHandler() {
            searchRecords(currentRecords);
        }
        
        document.getElementById("searchRecordBtn").addEventListener("click", searchRecordsHandler);
        document.getElementById("searchRecordInput").addEventListener("keyup", (e) => {
            if (e.key === "Enter") searchRecordsHandler();
        });
        document.getElementById("backToMain").addEventListener("click", () => {
            currentView = "mainApp";
            render();
        });
        
        searchRecords(currentRecords);
    }
    
    function promptEditPassword(recordName) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>> AUTORIZACAO NECESSARIA</h3>
                <p>REGISTRO: <strong>${escapeHtml(recordName)}</strong></p>
                ${!hasRecordPassword(loggedUser.nome, recordName) ? 
                    '<p>CRIAR SENHA DE 4 DIGITOS:</p>' : 
                    '<p>DIGITE A SENHA DE 4 DIGITOS:</p>'}
                <input type="password" id="editPassword" maxlength="4" placeholder="SENHA (4 DIGITOS)" autocomplete="off" inputmode="numeric">
                <div class="inline-buttons">
                    <button id="confirmEditPass">[ CONFIRMAR ]</button>
                    <button id="cancelEditPass" class="btn-secondary">[ CANCELAR ]</button>
                </div>
                <div id="passMsg" class="error-msg" style="display:none;"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById("confirmEditPass").addEventListener("click", () => {
            const password = document.getElementById("editPassword").value;
            const msgDiv = document.getElementById("passMsg");
            
            if (!/^\d{4}$/.test(password)) {
                msgDiv.style.display = "block";
                msgDiv.innerText = "[ERRO] SENHA DEVE TER 4 DIGITOS NUMERICOS";
                return;
            }
            
            if (!hasRecordPassword(loggedUser.nome, recordName)) {
                setRecordPassword(loggedUser.nome, recordName, password);
                modal.remove();
                openEditForm(recordName);
            } else {
                if (verifyRecordPassword(loggedUser.nome, recordName, password)) {
                    modal.remove();
                    openEditForm(recordName);
                } else {
                    msgDiv.style.display = "block";
                    msgDiv.innerText = "[ERRO] SENHA INCORRETA";
                }
            }
        });
        
        document.getElementById("cancelEditPass").addEventListener("click", () => {
            modal.remove();
        });
    }
    
    function openEditForm(recordName) {
        const record = getDatabaseRecords(loggedUser.nome).find(r => r.nomeCompleto === recordName);
        if (!record) return;
        
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>> EDITANDO: ${escapeHtml(recordName)}</h3>
                <label>NOME COMPLETO:</label>
                <input type="text" id="editNome" value="${escapeHtml(record.nomeCompleto)}">
                <label>DATA NASC:</label>
                <input type="date" id="editDataNasc" value="${record.dataNascimento || ''}">
                <label>CPF:</label>
                <input type="text" id="editCpf" value="${escapeHtml(record.cpf || '')}" maxlength="14" oninput="this.value = window.formatarCPF(this.value)">
                <label>CEP:</label>
                <input type="text" id="editCep" value="${escapeHtml(record.cep || '')}" maxlength="9" oninput="this.value = window.formatarCEP(this.value)">
                <label>CNPJ:</label>
                <input type="text" id="editCnpj" value="${escapeHtml(record.cnpj || '')}" maxlength="18" oninput="this.value = window.formatarCNPJ(this.value)">
                <label>RUA:</label>
                <input type="text" id="editRua" value="${escapeHtml(record.rua || '')}">
                <label>NUMERO:</label>
                <input type="text" id="editNumero" value="${escapeHtml(record.numeroCasa || '')}">
                <label>TELEFONE:</label>
                <input type="text" id="editTelefone" value="${escapeHtml(record.telefone || '')}" maxlength="15" oninput="this.value = window.formatarTelefone(this.value)">
                <label>GMAIL:</label>
                <input type="email" id="editGmail" value="${escapeHtml(record.gmail || '')}">
                <div class="inline-buttons">
                    <button id="saveEditBtn" class="btn-success">[ SALVAR ]</button>
                    <button id="closeEditBtn" class="btn-secondary">[ FECHAR ]</button>
                </div>
                <div id="editMsg" style="display:none;"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        window.formatarCPF = formatarCPF;
        window.formatarCEP = formatarCEP;
        window.formatarCNPJ = formatarCNPJ;
        window.formatarTelefone = formatarTelefone;
        
        document.getElementById("saveEditBtn").addEventListener("click", () => {
            const newNome = document.getElementById("editNome").value.trim();
            if (!newNome) {
                showMsgInModal("editMsg", "[ERRO] NOME OBRIGATORIO", "error");
                return;
            }
            
            const updatedData = {
                nomeCompleto: newNome,
                dataNascimento: document.getElementById("editDataNasc").value,
                cpf: document.getElementById("editCpf").value,
                cep: document.getElementById("editCep").value,
                cnpj: document.getElementById("editCnpj").value,
                rua: document.getElementById("editRua").value,
                numeroCasa: document.getElementById("editNumero").value,
                telefone: document.getElementById("editTelefone").value,
                gmail: document.getElementById("editGmail").value
            };
            
            updateDatabaseRecord(loggedUser.nome, recordName, updatedData);
            showMsgInModal("editMsg", "[OK] DADOS ATUALIZADOS", "success");
            setTimeout(() => modal.remove(), 1500);
        });
        
        document.getElementById("closeEditBtn").addEventListener("click", () => {
            modal.remove();
        });
    }
    
    function showMsg(elementId, message, type) {
        const el = document.getElementById(elementId);
        if (!el) return;
        el.style.display = "block";
        el.className = type === "success" ? "success-msg" : "error-msg";
        el.innerText = message;
        setTimeout(() => { el.style.display = "none"; }, 2000);
    }
    
    function showMsgTemporary(message, type) {
        const msgDiv = document.createElement("div");
        msgDiv.className = type === "success" ? "success-msg" : "error-msg";
        msgDiv.innerText = message;
        msgDiv.style.position = "fixed";
        msgDiv.style.bottom = "20px";
        msgDiv.style.left = "50%";
        msgDiv.style.transform = "translateX(-50%)";
        msgDiv.style.zIndex = "1001";
        msgDiv.style.backgroundColor = "#000";
        msgDiv.style.border = "1px solid #00ff00";
        msgDiv.style.padding = "10px 20px";
        msgDiv.style.borderRadius = "4px";
        msgDiv.style.whiteSpace = "nowrap";
        document.body.appendChild(msgDiv);
        setTimeout(() => msgDiv.remove(), 4000);
    }
    
    function showMsgInModal(elementId, message, type) {
        const el = document.getElementById(elementId);
        if (!el) return;
        el.style.display = "block";
        el.className = type === "success" ? "success-msg" : "error-msg";
        el.innerText = message;
        setTimeout(() => { el.style.display = "none"; }, 2000);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    initDB();
    render();
</script>
</body>
</html>
