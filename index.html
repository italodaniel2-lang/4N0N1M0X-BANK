    // ==================== BANCO DE DADOS ====================
    let loggedUser = null;
    let currentView = "login";

    function getDB() {
        let db = localStorage.getItem("meu_banco");
        return db ? JSON.parse(db) : [];
    }

    function saveDB(data) {
        localStorage.setItem("meu_banco", JSON.stringify(data));
    }
    
    function getSenha() {
        let senha = localStorage.getItem("senha_editar");
        return senha;
    }
    
    function setSenha(senha) {
        localStorage.setItem("senha_editar", senha);
    }
    
    function temSenhaCadastrada() {
        return getSenha() !== null;
    }

    function adicionarRegistro(registro) {
        let db = getDB();
        let existe = db.some(r => r.nomeCompleto.toLowerCase() === registro.nomeCompleto.toLowerCase());
        if (existe) return false;
        db.push(registro);
        saveDB(db);
        return true;
    }
    
    function adicionarOuAtualizarPorCPF(registro) {
        let db = getDB();
        let index = db.findIndex(r => r.cpf && r.cpf === registro.cpf && registro.cpf);
        
        if (index !== -1) {
            db[index] = { ...db[index], ...registro };
            saveDB(db);
            return { status: "atualizado", nome: db[index].nomeCompleto };
        } else {
            let existeNome = db.some(r => r.nomeCompleto.toLowerCase() === registro.nomeCompleto.toLowerCase());
            if (existeNome) return { status: "duplicado_nome", nome: registro.nomeCompleto };
            db.push(registro);
            saveDB(db);
            return { status: "adicionado", nome: registro.nomeCompleto };
        }
    }

    function atualizarRegistro(nomeAntigo, novosDados) {
        let db = getDB();
        let index = db.findIndex(r => r.nomeCompleto === nomeAntigo);
        if (index !== -1) {
            db[index] = { ...db[index], ...novosDados };
            saveDB(db);
            return true;
        }
        return false;
    }

    function deletarRegistro(nome) {
        let db = getDB();
        let novoDB = db.filter(r => r.nomeCompleto !== nome);
        if (novoDB.length !== db.length) {
            saveDB(novoDB);
            return true;
        }
        return false;
    }

    // ==================== FORMATACAO AUTOMATICA ====================
    function formatarCPF(valor) {
        let v = valor.replace(/\D/g, '');
        if (v.length <= 3) return v;
        if (v.length <= 6) return v.replace(/(\d{3})(\d+)/, '$1.$2');
        if (v.length <= 9) return v.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
        return v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, '$1.$2.$3-$4').substring(0, 14);
    }
    
    function formatarCNPJ(valor) {
        let v = valor.replace(/\D/g, '');
        if (v.length <= 2) return v;
        if (v.length <= 5) return v.replace(/(\d{2})(\d+)/, '$1.$2');
        if (v.length <= 8) return v.replace(/(\d{2})(\d{3})(\d+)/, '$1.$2.$3');
        if (v.length <= 12) return v.replace(/(\d{2})(\d{3})(\d{3})(\d+)/, '$1.$2.$3/$4');
        return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d+)/, '$1.$2.$3/$4-$5').substring(0, 18);
    }
    
    function formatarCEP(valor) {
        let v = valor.replace(/\D/g, '');
        if (v.length <= 5) return v;
        return v.replace(/(\d{5})(\d+)/, '$1-$2').substring(0, 9);
    }
    
    function formatarTelefone(valor) {
        let v = valor.replace(/\D/g, '');
        if (v.length <= 2) return v;
        if (v.length <= 7) return v.replace(/(\d{2})(\d+)/, '($1) $2');
        if (v.length <= 11) return v.replace(/(\d{2})(\d{4,5})(\d+)/, '($1) $2-$3');
        return v.replace(/(\d{2})(\d{5})(\d+)/, '($1) $2-$3').substring(0, 15);
    }
    
    function aplicarMascarasEmInputs() {
        const cpfInputs = document.querySelectorAll('input[placeholder*="CPF"], input[id*="Cpf"], input[id*="cpf"]');
        const cnpjInputs = document.querySelectorAll('input[placeholder*="CNPJ"], input[id*="Cnpj"], input[id*="cnpj"]');
        const cepInputs = document.querySelectorAll('input[placeholder*="CEP"], input[id*="Cep"], input[id*="cep"]');
        const telInputs = document.querySelectorAll('input[placeholder*="TELEFONE"], input[id*="Telefone"], input[id*="telefone"], input[placeholder*="TEL"]');
        
        cpfInputs.forEach(input => {
            if (!input.hasAttribute('data-mask')) {
                input.setAttribute('data-mask', 'cpf');
                input.addEventListener('input', function(e) {
                    let pos = this.selectionStart;
                    let raw = this.value.replace(/\D/g, '');
                    let formatted = formatarCPF(raw);
                    this.value = formatted;
                    let newPos = pos + (formatted.length - raw.length);
                    this.setSelectionRange(newPos, newPos);
                });
            }
        });
        
        cnpjInputs.forEach(input => {
            if (!input.hasAttribute('data-mask')) {
                input.setAttribute('data-mask', 'cnpj');
                input.addEventListener('input', function(e) {
                    let pos = this.selectionStart;
                    let raw = this.value.replace(/\D/g, '');
                    let formatted = formatarCNPJ(raw);
                    this.value = formatted;
                    let newPos = pos + (formatted.length - raw.length);
                    this.setSelectionRange(newPos, newPos);
                });
            }
        });
        
        cepInputs.forEach(input => {
            if (!input.hasAttribute('data-mask')) {
                input.setAttribute('data-mask', 'cep');
                input.addEventListener('input', function(e) {
                    let pos = this.selectionStart;
                    let raw = this.value.replace(/\D/g, '');
                    let formatted = formatarCEP(raw);
                    this.value = formatted;
                    let newPos = pos + (formatted.length - raw.length);
                    this.setSelectionRange(newPos, newPos);
                });
            }
        });
        
        telInputs.forEach(input => {
            if (!input.hasAttribute('data-mask')) {
                input.setAttribute('data-mask', 'tel');
                input.addEventListener('input', function(e) {
                    let pos = this.selectionStart;
                    let raw = this.value.replace(/\D/g, '');
                    let formatted = formatarTelefone(raw);
                    this.value = formatted;
                    let newPos = pos + (formatted.length - raw.length);
                    this.setSelectionRange(newPos, newPos);
                });
            }
        });
    }

    // ==================== EXPORTAR JSON ====================
    function exportarJSON() {
        let db = getDB();
        let exportData = {};
        exportData[loggedUser] = {
            records: db
        };
        
        let dataStr = JSON.stringify(exportData, null, 2);
        let blob = new Blob([dataStr], { type: "application/json" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = `hacker_db_${loggedUser}_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        mostrarMsg("BANCO DE DADOS EXPORTADO COM SUCESSO", "success");
    }

    // ==================== IMPORTAR JSON ====================
    function importarJSON(file) {
        let reader = new FileReader();
        reader.onload = function(e) {
            try {
                let json = JSON.parse(e.target.result);
                let registros = [];
                
                if (Array.isArray(json)) {
                    registros = json;
                } else if (json.records && Array.isArray(json.records)) {
                    registros = json.records;
                } else {
                    for (let key in json) {
                        if (json[key] && Array.isArray(json[key].records)) {
                            registros = json[key].records;
                            break;
                        } else if (json[key] && json[key].nomeCompleto) {
                            registros.push(json[key]);
                        }
                    }
                }

                let adicionados = 0;
                let atualizados = 0;
                let duplicadosNome = 0;

                for (let reg of registros) {
                    if (reg.nomeCompleto) {
                        let limparCPF = (reg.cpf || "").replace(/\D/g, '');
                        let novoReg = {
                            nomeCompleto: reg.nomeCompleto,
                            dataNascimento: reg.dataNascimento || "",
                            cpf: limparCPF ? formatarCPF(limparCPF) : "",
                            cep: reg.cep || "",
                            cnpj: reg.cnpj || "",
                            rua: reg.rua || "",
                            numeroCasa: reg.numeroCasa || "",
                            telefone: reg.telefone || "",
                            gmail: reg.gmail || reg.email || ""
                        };
                        
                        let resultado = adicionarOuAtualizarPorCPF(novoReg);
                        if (resultado.status === "adicionado") {
                            adicionados++;
                        } else if (resultado.status === "atualizado") {
                            atualizados++;
                        } else if (resultado.status === "duplicado_nome") {
                            duplicadosNome++;
                        }
                    }
                }

                mostrarMsg("ADICIONADOS: " + adicionados + " | ATUALIZADOS POR CPF: " + atualizados + " | DUPLICADOS (NOME): " + duplicadosNome, "success");
                if (currentView === "visualizar") renderVisualizar();
                if (currentView === "editar") renderEditar();
                
            } catch (erro) {
                mostrarMsg("ERRO AO LER JSON: " + erro.message, "error");
            }
        };
        reader.readAsText(file);
    }
    
    // ==================== VERIFICAR SENHA ====================
    function verificarSenhaOuCriar(callback) {
        if (temSenhaCadastrada()) {
            let modal = document.createElement("div");
            modal.className = "modal";
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>> ACESSO RESTRITO</h3>
                    <p>DIGITE A SENHA DE 4 DIGITOS PARA ACESSAR O EDITOR</p>
                    <input type="password" id="senhaAcesso" class="senha-input" maxlength="4" placeholder="****" autocomplete="off">
                    <div class="inline-buttons" style="margin-top:15px;">
                        <button id="confirmarSenha">[ CONFIRMAR ]</button>
                        <button id="cancelarSenha" class="btn-secondary">[ CANCELAR ]</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            let inputSenha = document.getElementById("senhaAcesso");
            inputSenha.focus();
            
            document.getElementById("confirmarSenha").onclick = () => {
                let senha = inputSenha.value;
                if (senha === getSenha()) {
                    modal.remove();
                    callback(true);
                } else {
                    mostrarMsg("SENHA INCORRETA! ACESSO NEGADO.", "error");
                    modal.remove();
                    callback(false);
                }
            };
            
            document.getElementById("cancelarSenha").onclick = () => {
                modal.remove();
                callback(false);
            };
            
            inputSenha.onkeypress = (e) => {
                if (e.key === "Enter") {
                    let senha = inputSenha.value;
                    if (senha === getSenha()) {
                        modal.remove();
                        callback(true);
                    } else {
                        mostrarMsg("SENHA INCORRETA!", "error");
                        modal.remove();
                        callback(false);
                    }
                }
            };
        } else {
            let modal = document.createElement("div");
            modal.className = "modal";
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>> CRIAR SENHA</h3>
                    <p>PRIMEIRO ACESSO! CRIE UMA SENHA DE 4 DIGITOS:</p>
                    <input type="password" id="novaSenha" class="senha-input" maxlength="4" placeholder="****" autocomplete="off">
                    <input type="password" id="confirmarNovaSenha" class="senha-input" maxlength="4" placeholder="CONFIRMAR SENHA" autocomplete="off" style="margin-top:10px;">
                    <div class="inline-buttons" style="margin-top:15px;">
                        <button id="salvarSenha">[ CRIAR SENHA ]</button>
                        <button id="cancelarSenha" class="btn-secondary">[ CANCELAR ]</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById("salvarSenha").onclick = () => {
                let novaSenha = document.getElementById("novaSenha").value;
                let confirmar = document.getElementById("confirmarNovaSenha").value;
                
                if (novaSenha.length !== 4) {
                    mostrarMsg("A SENHA DEVE TER EXATAMENTE 4 DIGITOS!", "error");
                    return;
                }
                if (novaSenha !== confirmar) {
                    mostrarMsg("AS SENHAS NAO COINCIDEM!", "error");
                    return;
                }
                
                setSenha(novaSenha);
                modal.remove();
                mostrarMsg("SENHA CRIADA COM SUCESSO! ACESSO PERMITIDO.", "success");
                callback(true);
            };
            
            document.getElementById("cancelarSenha").onclick = () => {
                modal.remove();
                callback(false);
            };
        }
    }

            <div class="card">
                <div class="button-group">
                    <button id="btnVisualizar">[ VISUALIZAR DB ]</button>
                    <button id="btnEditar">[ EDITAR DB ]</button>
                    <button id="btnImportar">[ IMPORTAR JSON ]</button>
                    <button id="btnExportar" class="btn-warning">[ EXPORTAR JSON ]</button>
                </div>
            </div>

            verificarSenhaOuCriar((acessoPermitido) => {
                if (acessoPermitido) {
                    currentView = "editar";
                    render();
                }
            });

        document.getElementById("btnImportar").onclick = () => { currentView = "importar"; render(); };

    function renderVisualizar() {
        let db = getDB();
        
        function buscar() {
            let termo = document.getElementById("searchInput").value.toLowerCase();
            let filtrados = termo ? db.filter(r => r.nomeCompleto.toLowerCase().includes(termo)) : db;
            let container = document.getElementById("lista");
            if (filtrados.length === 0) {
                container.innerHTML = '<div class="msg">[ NENHUM REGISTRO ]</div>';
                return;
            }
            container.innerHTML = filtrados.map(r => `
                <div class="data-row">
                    <strong>> ${escapeHtml(r.nomeCompleto)}</strong><br>
                    DATA: ${escapeHtml(r.dataNascimento || "---")} | CPF: ${escapeHtml(r.cpf || "---")}<br>
                    TEL: ${escapeHtml(r.telefone || "---")} | EMAIL: ${escapeHtml(r.gmail || "---")}<br>
                    END: ${escapeHtml(r.rua || "---")}, ${escapeHtml(r.numeroCasa || "---")}<br>
                    CEP: ${escapeHtml(r.cep || "---")} | CNPJ: ${escapeHtml(r.cnpj || "---")}
                </div>
            `).join("");
        }

        root.innerHTML = `
            <div>
                <button id="voltarBtn" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> VISUALIZAR DB (${db.length} registros)</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="PESQUISAR POR NOME">
                    <button id="buscarBtn">[ BUSCAR ]</button>
                </div>
                <div id="lista"></div>
            </div>
        `;
        buscar();
        document.getElementById("buscarBtn").onclick = buscar;
        document.getElementById("voltarBtn").onclick = () => { currentView = "main"; render(); };
    }

    function renderEditar() {
        let db = getDB();
        
        function carregarLista() {
            let termo = document.getElementById("searchEdit").value.toLowerCase();
            let filtrados = termo ? db.filter(r => r.nomeCompleto.toLowerCase().includes(termo)) : db;
            let container = document.getElementById("listaEdit");
            if (filtrados.length === 0) {
                container.innerHTML = '<div class="msg">[ NENHUM REGISTRO ]</div>';
                return;
            }
            container.innerHTML = filtrados.map(r => `
                <div class="data-row">
                    <strong>> ${escapeHtml(r.nomeCompleto)}</strong><br>
                    DATA: ${escapeHtml(r.dataNascimento || "---")} | CPF: ${escapeHtml(r.cpf || "---")}
                    <div class="inline-buttons">
                        <button class="editarBtn" data-nome="${escapeHtml(r.nomeCompleto)}">[ EDITAR ]</button>
                        <button class="excluirBtn" data-nome="${escapeHtml(r.nomeCompleto)}">[ EXCLUIR ]</button>
                    </div>
                </div>
            `).join("");
            
            document.querySelectorAll(".editarBtn").forEach(btn => {
                btn.onclick = () => abrirEdicao(btn.getAttribute("data-nome"));
            });
            document.querySelectorAll(".excluirBtn").forEach(btn => {
                btn.onclick = () => excluirRegistro(btn.getAttribute("data-nome"));
            });
        }

        function excluirRegistro(nome) {
            if (confirm(`EXCLUIR "${nome}"?`)) {
                deletarRegistro(nome);
                db = getDB();
                carregarLista();
                mostrarMsg("REGISTRO EXCLUIDO", "success");
            }
        }

        function abrirEdicao(nome) {
            let registro = db.find(r => r.nomeCompleto === nome);
            let modal = document.createElement("div");
            modal.className = "modal";
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>EDITAR: ${escapeHtml(nome)}</h3>
                    <input type="text" id="editNome" value="${escapeHtml(registro.nomeCompleto)}" placeholder="NOME">
                    <input type="date" id="editDataNasc" value="${registro.dataNascimento || ''}">
                    <input type="text" id="editCpf" value="${escapeHtml(registro.cpf || '')}" placeholder="CPF">
                    <input type="text" id="editCep" value="${escapeHtml(registro.cep || '')}" placeholder="CEP">
                    <input type="text" id="editCnpj" value="${escapeHtml(registro.cnpj || '')}" placeholder="CNPJ">
                    <input type="text" id="editRua" value="${escapeHtml(registro.rua || '')}" placeholder="RUA">
                    <input type="text" id="editNumero" value="${escapeHtml(registro.numeroCasa || '')}" placeholder="NUMERO">
                    <input type="text" id="editTelefone" value="${escapeHtml(registro.telefone || '')}" placeholder="TELEFONE">
                    <input type="email" id="editGmail" value="${escapeHtml(registro.gmail || '')}" placeholder="EMAIL">
                    <div class="inline-buttons">
                        <button id="salvarEdit">[ SALVAR ]</button>
                        <button id="cancelarEdit" class="btn-secondary">[ CANCELAR ]</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            aplicarMascarasEmInputs();
            
            document.getElementById("salvarEdit").onclick = () => {
                let cpfRaw = document.getElementById("editCpf").value.replace(/\D/g, '');
                let telefoneRaw = document.getElementById("editTelefone").value.replace(/\D/g, '');
                let cepRaw = document.getElementById("editCep").value.replace(/\D/g, '');
                let cnpjRaw = document.getElementById("editCnpj").value.replace(/\D/g, '');
                
                let novos = {
                    nomeCompleto: document.getElementById("editNome").value,
                    dataNascimento: document.getElementById("editDataNasc").value,
                    cpf: cpfRaw ? formatarCPF(cpfRaw) : "",
                    cep: cepRaw ? formatarCEP(cepRaw) : "",
                    cnpj: cnpjRaw ? formatarCNPJ(cnpjRaw) : "",
                    rua: document.getElementById("editRua").value,
                    numeroCasa: document.getElementById("editNumero").value,
                    telefone: telefoneRaw ? formatarTelefone(telefoneRaw) : "",
                    gmail: document.getElementById("editGmail").value
                };
                atualizarRegistro(nome, novos);
                modal.remove();
                db = getDB();
                carregarLista();
                mostrarMsg("REGISTRO ATUALIZADO", "success");
            };
            document.getElementById("cancelarEdit").onclick = () => modal.remove();
        }

        root.innerHTML = `
            <div>
                <button id="voltarBtn" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> EDITAR DB (${db.length} registros)</h2>
                
                <div class="card">
                    <h3>[ ADICIONAR NOVO ]</h3>
                    <input type="text" id="novoNome" placeholder="NOME COMPLETO">
                    <input type="date" id="novoDataNasc">
                    <input type="text" id="novoCpf" placeholder="CPF">
                    <input type="text" id="novoCep" placeholder="CEP">
                    <input type="text" id="novoCnpj" placeholder="CNPJ">
                    <input type="text" id="novoRua" placeholder="RUA">
                    <input type="text" id="novoNumero" placeholder="NUMERO">
                    <input type="text" id="novoTelefone" placeholder="TELEFONE">
                    <input type="email" id="novoGmail" placeholder="EMAIL">
                    <button id="adicionarBtn" class="btn-success">[ ADICIONAR ]</button>
                    <div id="addMsg"></div>
                </div>
                
                <div class="card">
                    <h3>[ REGISTROS EXISTENTES ]</h3>
                    <div class="search-bar">
                        <input type="text" id="searchEdit" placeholder="PESQUISAR...">
                        <button id="buscarEdit">[ BUSCAR ]</button>
                    </div>
                    <div id="listaEdit"></div>
                </div>
            </div>
        `;
        
        aplicarMascarasEmInputs();
        carregarLista();
        
        document.getElementById("adicionarBtn").onclick = () => {
            let nome = document.getElementById("novoNome").value.trim();
            if (!nome) {
                document.getElementById("addMsg").innerHTML = '<div class="msg msg-error">NOME OBRIGATORIO</div>';
                return;
            }
            
            let cpfRaw = document.getElementById("novoCpf").value.replace(/\D/g, '');
            let telefoneRaw = document.getElementById("novoTelefone").value.replace(/\D/g, '');
            let cepRaw = document.getElementById("novoCep").value.replace(/\D/g, '');
            let cnpjRaw = document.getElementById("novoCnpj").value.replace(/\D/g, '');
            
            let novo = {
                nomeCompleto: nome,
                dataNascimento: document.getElementById("novoDataNasc").value,
                cpf: cpfRaw ? formatarCPF(cpfRaw) : "",
                cep: cepRaw ? formatarCEP(cepRaw) : "",
                cnpj: cnpjRaw ? formatarCNPJ(cnpjRaw) : "",
                rua: document.getElementById("novoRua").value,
                numeroCasa: document.getElementById("novoNumero").value,
                telefone: telefoneRaw ? formatarTelefone(telefoneRaw) : "",
                gmail: document.getElementById("novoGmail").value
            };
            if (adicionarRegistro(novo)) {
                document.getElementById("addMsg").innerHTML = '<div class="msg msg-success">ADICIONADO!</div>';
                document.getElementById("novoNome").value = "";
                document.getElementById("novoDataNasc").value = "";
                document.getElementById("novoCpf").value = "";
                document.getElementById("novoCep").value = "";
                document.getElementById("novoCnpj").value = "";
                document.getElementById("novoRua").value = "";
                document.getElementById("novoNumero").value = "";
                document.getElementById("novoTelefone").value = "";
                document.getElementById("novoGmail").value = "";
                db = getDB();
                carregarLista();
                setTimeout(() => { document.getElementById("addMsg").innerHTML = ""; }, 2000);
            } else {
                document.getElementById("addMsg").innerHTML = '<div class="msg msg-error">REGISTRO JA EXISTE</div>';
                setTimeout(() => { document.getElementById("addMsg").innerHTML = ""; }, 2000);
            }
        };
        
        document.getElementById("buscarEdit").onclick = () => carregarLista();
        document.getElementById("searchEdit").onkeyup = (e) => { if(e.key === "Enter") carregarLista(); };
        document.getElementById("voltarBtn").onclick = () => { currentView = "main"; render(); };
    }

    function renderImportar() {
        root.innerHTML = `
            <div>
                <button id="voltarBtn" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> IMPORTAR JSON</h2>
                <div class="card">
                    <div class="file-area" id="dropZone">
                        CLIQUE OU ARRASTE UM ARQUIVO JSON
                        <input type="file" id="fileInput" accept=".json" style="display:none;">
                    </div>
                    <small>OS DADOS IMPORTADOS VAO DIRETO PARA O BANCO DE DADOS</small>
                    <small>* SE O CPF JA EXISTIR, O REGISTRO SERA ATUALIZADO</small>
                    <div id="importMsg"></div>
                </div>
            </div>
        `;
        
        let dropZone = document.getElementById("dropZone");
        let fileInput = document.getElementById("fileInput");
        
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = "rgba(0,255,0,0.1)"; };
        dropZone.ondragleave = () => { dropZone.style.background = "transparent"; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.background = "transparent";
            let file = e.dataTransfer.files[0];
            if (file) importarJSON(file);
        };
        
        fileInput.onchange = (e) => {
            if (e.target.files[0]) importarJSON(e.target.files[0]);
        };
        
        document.getElementById("voltarBtn").onclick = () => { currentView = "main"; render(); };
    }

    function mostrarMsg(msg, tipo) {
        let div = document.createElement("div");
        div.className = `msg msg-${tipo}`;
        div.innerText = msg;
        div.style.position = "fixed";
        div.style.bottom = "20px";
        div.style.left = "50%";
        div.style.transform = "translateX(-50%)";
        div.style.zIndex = "1000";
        div.style.background = "#000";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    render();
</script>
