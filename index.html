<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HACKER DATABASE - IMPORTAR/EXPORTAR JSON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body, body * {
            color: #00ff00 !important;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background: #000000;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
        }

        .ascii-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 9px;
            white-space: pre;
            font-family: monospace;
        }
        
        .user-name {
            text-align: center;
            margin: 10px 0 20px 0;
            padding: 10px;
            border-top: 1px solid #00ff00;
            border-bottom: 1px solid #00ff00;
            font-size: 1.4rem;
            font-weight: bold;
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-left: 3px solid #00ff00;
            padding-left: 12px;
        }

        .card {
            background: #000000;
            border: 1px solid #00ff00;
            border-radius: 6px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .button-group button {
            flex: 1;
            min-width: 120px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: 'Share Tech Mono', monospace;
            background: #000000;
            cursor: pointer;
        }

        input {
            cursor: text;
        }

        button:hover {
            background: #00ff00;
            color: #000000 !important;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
        }

        .btn-secondary { border-color: #006600; }
        .btn-danger { border-color: #ff0000; }
        .btn-success { border-color: #00ff00; }
        .btn-warning { border-color: #ffff00; }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .search-bar input {
            flex: 1;
            margin-top: 0;
        }
        .search-bar button {
            width: auto;
            margin-top: 0;
        }

        .data-row {
            background: #000000;
            border: 1px solid #00ff00;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #00ff00;
        }

        .inline-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .inline-buttons button {
            margin-top: 0;
            padding: 6px;
            font-size: 0.8rem;
        }

        .file-area {
            border: 2px dashed #00ff00;
            border-radius: 6px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .file-area:hover {
            background: rgba(0, 255, 0, 0.05);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #00ff00;
            margin-bottom: 15px;
        }

        .msg {
            padding: 8px;
            margin-top: 10px;
            text-align: center;
            border: 1px solid #00ff00;
        }
        .msg-error { border-color: #ff0000; color: #ff0000 !important; }
        .msg-success { border-color: #00ff00; }

        small {
            font-size: 0.65rem;
            display: block;
            margin-top: 8px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border: 2px solid #00ff00;
        }
        .modal-content {
            background: #000000;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<script>
    // ==================== BANCO DE DADOS ====================
    let loggedUser = null;
    let currentView = "login";

    function getDB() {
        let db = localStorage.getItem("meu_banco");
        return db ? JSON.parse(db) : [];
    }

    function saveDB(data) {
        localStorage.setItem("meu_banco", JSON.stringify(data));
    }

    function adicionarRegistro(registro) {
        let db = getDB();
        let existe = db.some(r => r.nomeCompleto.toLowerCase() === registro.nomeCompleto.toLowerCase());
        if (existe) return false;
        db.push(registro);
        saveDB(db);
        return true;
    }

    function atualizarRegistro(nomeAntigo, novosDados) {
        let db = getDB();
        let index = db.findIndex(r => r.nomeCompleto === nomeAntigo);
        if (index !== -1) {
            db[index] = { ...db[index], ...novosDados };
            saveDB(db);
            return true;
        }
        return false;
    }

    function deletarRegistro(nome) {
        let db = getDB();
        let novoDB = db.filter(r => r.nomeCompleto !== nome);
        if (novoDB.length !== db.length) {
            saveDB(novoDB);
            return true;
        }
        return false;
    }

    // ==================== EXPORTAR JSON ====================
    function exportarJSON() {
        let db = getDB();
        let exportData = {};
        exportData[loggedUser] = {
            records: db
        };
        
        let dataStr = JSON.stringify(exportData, null, 2);
        let blob = new Blob([dataStr], { type: "application/json" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = `hacker_db_${loggedUser}_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        mostrarMsg("BANCO DE DADOS EXPORTADO COM SUCESSO", "success");
    }

    // ==================== IMPORTAR JSON ====================
    function importarJSON(file) {
        let reader = new FileReader();
        reader.onload = function(e) {
            try {
                let json = JSON.parse(e.target.result);
                let registros = [];
                
                if (Array.isArray(json)) {
                    registros = json;
                } else if (json.records && Array.isArray(json.records)) {
                    registros = json.records;
                } else {
                    for (let key in json) {
                        if (json[key] && Array.isArray(json[key].records)) {
                            registros = json[key].records;
                            break;
                        } else if (json[key] && json[key].nomeCompleto) {
                            registros.push(json[key]);
                        }
                    }
                }

                let importados = 0;
                let duplicados = 0;

                for (let reg of registros) {
                    if (reg.nomeCompleto) {
                        let novoReg = {
                            nomeCompleto: reg.nomeCompleto,
                            dataNascimento: reg.dataNascimento || "",
                            cpf: reg.cpf || "",
                            cep: reg.cep || "",
                            cnpj: reg.cnpj || "",
                            rua: reg.rua || "",
                            numeroCasa: reg.numeroCasa || "",
                            telefone: reg.telefone || "",
                            gmail: reg.gmail || reg.email || ""
                        };
                        if (adicionarRegistro(novoReg)) {
                            importados++;
                        } else {
                            duplicados++;
                        }
                    }
                }

                mostrarMsg("IMPORTADO: " + importados + " | DUPLICADOS: " + duplicados, "success");
                if (currentView === "visualizar") renderVisualizar();
                if (currentView === "editar") renderEditar();
                
            } catch (erro) {
                mostrarMsg("ERRO AO LER JSON: " + erro.message, "error");
            }
        };
        reader.readAsText(file);
    }

    // ==================== TELAS ====================
    const root = document.getElementById("appRoot");

    function render() {
        if (currentView === "login") renderLogin();
        else if (currentView === "main") renderMain();
        else if (currentView === "visualizar") renderVisualizar();
        else if (currentView === "editar") renderEditar();
        else if (currentView === "importar") renderImportar();
    }

    function renderLogin() {
        root.innerHTML = `
            <div class="ascii-header">
  в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— 
  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—
  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ
  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—
  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘
  в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ
            </div>
            <div class="card">
                <h2>> ACESSO</h2>
                <input type="text" id="nomeUser" placeholder="NOME DE USUARIO">
                <button id="entrarBtn">[ ENTRAR ]</button>
                <small>DIGITE SEU NOME PARA COMEГҮAR</small>
            </div>
        `;
        document.getElementById("entrarBtn").onclick = () => {
            let nome = document.getElementById("nomeUser").value.trim();
            if (nome) {
                loggedUser = nome;
                currentView = "main";
                render();
            }
        };
    }

    function renderMain() {
        root.innerHTML = `
            <div class="ascii-header">
  в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— 
  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—
  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ
  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—
  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘
  в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ
            </div>
            <div class="user-name">[ ${loggedUser.toUpperCase()} ]</div>
            <div class="card">
                <div class="button-group">
                    <button id="btnVisualizar">[ VISUALIZAR DB ]</button>
                    <button id="btnEditar">[ EDITAR DB ]</button>
                    <button id="btnImportar">[ IMPORTAR JSON ]</button>
                    <button id="btnExportar" class="btn-warning">[ EXPORTAR JSON ]</button>
                </div>
            </div>
            <div class="card">
                <small>BANCO DE DADOS: ${getDB().length} REGISTROS</small>
                <small>IMPORTE UM JSON E OS DADOS VAO PARA O BANCO</small>
                <small>EXPORTE PARA FAZER BACKUP DOS SEUS DADOS</small>
            </div>
        `;
        document.getElementById("btnVisualizar").onclick = () => { currentView = "visualizar"; render(); };
        document.getElementById("btnEditar").onclick = () => { currentView = "editar"; render(); };
        document.getElementById("btnImportar").onclick = () => { currentView = "importar"; render(); };
        document.getElementById("btnExportar").onclick = () => { exportarJSON(); };
    }

    function renderVisualizar() {
        let db = getDB();
        
        function buscar() {
            let termo = document.getElementById("searchInput").value.toLowerCase();
            let filtrados = termo ? db.filter(r => r.nomeCompleto.toLowerCase().includes(termo)) : db;
            let container = document.getElementById("lista");
            if (filtrados.length === 0) {
                container.innerHTML = '<div class="msg">[ NENHUM REGISTRO ]</div>';
                return;
            }
            container.innerHTML = filtrados.map(r => `
                <div class="data-row">
                    <strong>> ${escapeHtml(r.nomeCompleto)}</strong><br>
                    DATA: ${escapeHtml(r.dataNascimento || "---")} | CPF: ${escapeHtml(r.cpf || "---")}<br>
                    TEL: ${escapeHtml(r.telefone || "---")} | EMAIL: ${escapeHtml(r.gmail || "---")}<br>
                    END: ${escapeHtml(r.rua || "---")}, ${escapeHtml(r.numeroCasa || "---")}<br>
                    CEP: ${escapeHtml(r.cep || "---")} | CNPJ: ${escapeHtml(r.cnpj || "---")}
                </div>
            `).join("");
        }

        root.innerHTML = `
            <div>
                <button id="voltarBtn" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> VISUALIZAR DB (${db.length} registros)</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="PESQUISAR POR NOME">
                    <button id="buscarBtn">[ BUSCAR ]</button>
                </div>
                <div id="lista"></div>
            </div>
        `;
        buscar();
        document.getElementById("buscarBtn").onclick = buscar;
        document.getElementById("voltarBtn").onclick = () => { currentView = "main"; render(); };
    }

    function renderEditar() {
        let db = getDB();
        
        function carregarLista() {
            let termo = document.getElementById("searchEdit").value.toLowerCase();
            let filtrados = termo ? db.filter(r => r.nomeCompleto.toLowerCase().includes(termo)) : db;
            let container = document.getElementById("listaEdit");
            if (filtrados.length === 0) {
                container.innerHTML = '<div class="msg">[ NENHUM REGISTRO ]</div>';
                return;
            }
            container.innerHTML = filtrados.map(r => `
                <div class="data-row">
                    <strong>> ${escapeHtml(r.nomeCompleto)}</strong><br>
                    DATA: ${escapeHtml(r.dataNascimento || "---")} | CPF: ${escapeHtml(r.cpf || "---")}
                    <div class="inline-buttons">
                        <button class="editarBtn" data-nome="${escapeHtml(r.nomeCompleto)}">[ EDITAR ]</button>
                        <button class="excluirBtn" data-nome="${escapeHtml(r.nomeCompleto)}">[ EXCLUIR ]</button>
                    </div>
                </div>
            `).join("");
            
            document.querySelectorAll(".editarBtn").forEach(btn => {
                btn.onclick = () => abrirEdicao(btn.getAttribute("data-nome"));
            });
            document.querySelectorAll(".excluirBtn").forEach(btn => {
                btn.onclick = () => excluirRegistro(btn.getAttribute("data-nome"));
            });
        }

        function excluirRegistro(nome) {
            if (confirm(`EXCLUIR "${nome}"?`)) {
                deletarRegistro(nome);
                db = getDB();
                carregarLista();
                mostrarMsg("REGISTRO EXCLUIDO", "success");
            }
        }

        function abrirEdicao(nome) {
            let registro = db.find(r => r.nomeCompleto === nome);
            let modal = document.createElement("div");
            modal.className = "modal";
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>EDITAR: ${escapeHtml(nome)}</h3>
                    <input type="text" id="editNome" value="${escapeHtml(registro.nomeCompleto)}" placeholder="NOME">
                    <input type="date" id="editDataNasc" value="${registro.dataNascimento || ''}">
                    <input type="text" id="editCpf" value="${escapeHtml(registro.cpf || '')}" placeholder="CPF">
                    <input type="text" id="editCep" value="${escapeHtml(registro.cep || '')}" placeholder="CEP">
                    <input type="text" id="editCnpj" value="${escapeHtml(registro.cnpj || '')}" placeholder="CNPJ">
                    <input type="text" id="editRua" value="${escapeHtml(registro.rua || '')}" placeholder="RUA">
                    <input type="text" id="editNumero" value="${escapeHtml(registro.numeroCasa || '')}" placeholder="NUMERO">
                    <input type="text" id="editTelefone" value="${escapeHtml(registro.telefone || '')}" placeholder="TELEFONE">
                    <input type="email" id="editGmail" value="${escapeHtml(registro.gmail || '')}" placeholder="EMAIL">
                    <div class="inline-buttons">
                        <button id="salvarEdit">[ SALVAR ]</button>
                        <button id="cancelarEdit" class="btn-secondary">[ CANCELAR ]</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById("salvarEdit").onclick = () => {
                let novos = {
                    nomeCompleto: document.getElementById("editNome").value,
                    dataNascimento: document.getElementById("editDataNasc").value,
                    cpf: document.getElementById("editCpf").value,
                    cep: document.getElementById("editCep").value,
                    cnpj: document.getElementById("editCnpj").value,
                    rua: document.getElementById("editRua").value,
                    numeroCasa: document.getElementById("editNumero").value,
                    telefone: document.getElementById("editTelefone").value,
                    gmail: document.getElementById("editGmail").value
                };
                atualizarRegistro(nome, novos);
                modal.remove();
                db = getDB();
                carregarLista();
                mostrarMsg("REGISTRO ATUALIZADO", "success");
            };
            document.getElementById("cancelarEdit").onclick = () => modal.remove();
        }

        root.innerHTML = `
            <div>
                <button id="voltarBtn" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> EDITAR DB (${db.length} registros)</h2>
                
                <div class="card">
                    <h3>[ ADICIONAR NOVO ]</h3>
                    <input type="text" id="novoNome" placeholder="NOME COMPLETO">
                    <input type="date" id="novoDataNasc">
                    <input type="text" id="novoCpf" placeholder="CPF">
                    <input type="text" id="novoCep" placeholder="CEP">
                    <input type="text" id="novoCnpj" placeholder="CNPJ">
                    <input type="text" id="novoRua" placeholder="RUA">
                    <input type="text" id="novoNumero" placeholder="NUMERO">
                    <input type="text" id="novoTelefone" placeholder="TELEFONE">
                    <input type="email" id="novoGmail" placeholder="EMAIL">
                    <button id="adicionarBtn" class="btn-success">[ ADICIONAR ]</button>
                    <div id="addMsg"></div>
                </div>
                
                <div class="card">
                    <h3>[ REGISTROS EXISTENTES ]</h3>
                    <div class="search-bar">
                        <input type="text" id="searchEdit" placeholder="PESQUISAR...">
                        <button id="buscarEdit">[ BUSCAR ]</button>
                    </div>
                    <div id="listaEdit"></div>
                </div>
            </div>
        `;
        
        carregarLista();
        
        document.getElementById("adicionarBtn").onclick = () => {
            let nome = document.getElementById("novoNome").value.trim();
            if (!nome) {
                document.getElementById("addMsg").innerHTML = '<div class="msg msg-error">NOME OBRIGATORIO</div>';
                return;
            }
            let novo = {
                nomeCompleto: nome,
                dataNascimento: document.getElementById("novoDataNasc").value,
                cpf: document.getElementById("novoCpf").value,
                cep: document.getElementById("novoCep").value,
                cnpj: document.getElementById("novoCnpj").value,
                rua: document.getElementById("novoRua").value,
                numeroCasa: document.getElementById("novoNumero").value,
                telefone: document.getElementById("novoTelefone").value,
                gmail: document.getElementById("novoGmail").value
            };
            if (adicionarRegistro(novo)) {
                document.getElementById("addMsg").innerHTML = '<div class="msg msg-success">ADICIONADO!</div>';
                document.getElementById("novoNome").value = "";
                document.getElementById("novoDataNasc").value = "";
                document.getElementById("novoCpf").value = "";
                document.getElementById("novoCep").value = "";
                document.getElementById("novoCnpj").value = "";
                document.getElementById("novoRua").value = "";
                document.getElementById("novoNumero").value = "";
                document.getElementById("novoTelefone").value = "";
                document.getElementById("novoGmail").value = "";
                db = getDB();
                carregarLista();
                setTimeout(() => { document.getElementById("addMsg").innerHTML = ""; }, 2000);
            } else {
                document.getElementById("addMsg").innerHTML = '<div class="msg msg-error">REGISTRO JA EXISTE</div>';
                setTimeout(() => { document.getElementById("addMsg").innerHTML = ""; }, 2000);
            }
        };
        
        document.getElementById("buscarEdit").onclick = () => carregarLista();
        document.getElementById("searchEdit").onkeyup = (e) => { if(e.key === "Enter") carregarLista(); };
        document.getElementById("voltarBtn").onclick = () => { currentView = "main"; render(); };
    }

    function renderImportar() {
        root.innerHTML = `
            <div>
                <button id="voltarBtn" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> IMPORTAR JSON</h2>
                <div class="card">
                    <div class="file-area" id="dropZone">
                        CLIQUE OU ARRASTE UM ARQUIVO JSON
                        <input type="file" id="fileInput" accept=".json" style="display:none;">
                    </div>
                    <small>OS DADOS IMPORTADOS VAO DIRETO PARA O BANCO DE DADOS</small>
                    <small>APARECERAO EM VISUALIZAR DB E EDITAR DB</small>
                    <div id="importMsg"></div>
                </div>
            </div>
        `;
        
        let dropZone = document.getElementById("dropZone");
        let fileInput = document.getElementById("fileInput");
        
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = "rgba(0,255,0,0.1)"; };
        dropZone.ondragleave = () => { dropZone.style.background = "transparent"; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.background = "transparent";
            let file = e.dataTransfer.files[0];
            if (file) importarJSON(file);
        };
        
        fileInput.onchange = (e) => {
            if (e.target.files[0]) importarJSON(e.target.files[0]);
        };
        
        document.getElementById("voltarBtn").onclick = () => { currentView = "main"; render(); };
    }

    function mostrarMsg(msg, tipo) {
        let div = document.createElement("div");
        div.className = `msg msg-${tipo}`;
        div.innerText = msg;
        div.style.position = "fixed";
        div.style.bottom = "20px";
        div.style.left = "50%";
        div.style.transform = "translateX(-50%)";
        div.style.zIndex = "1000";
        div.style.background = "#000";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    render();
</script>
</body>
</html>
