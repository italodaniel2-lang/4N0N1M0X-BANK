<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HACKER DATABASE v1.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Tudo que for texto e símbolos fica verde */
        body, body * {
            color: #00ff00 !important;
        }

        /* Efeito de scanline */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        /* Efeito de glow nas bordas */
        .app-container {
            width: 100%;
            max-width: 700px;
            background: #000000;
            border: 2px solid #00ff00;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 10px rgba(0, 255, 0, 0.05);
            overflow: hidden;
            padding: 20px 24px 28px;
            transition: all 0.2s ease;
            position: relative;
        }

        /* ASCII Art Header */
        .ascii-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 10px;
            line-height: 1.2;
            white-space: pre;
            font-family: monospace;
            letter-spacing: 0;
            text-shadow: 0 0 5px #00ff00;
        }
        
        /* Estilo normal para o nome do usuário */
        .user-name {
            text-align: center;
            margin: 10px 0 20px 0;
            padding: 10px 0;
            border-top: 1px solid #00ff00;
            border-bottom: 1px solid #00ff00;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px #00ff00;
        }

        h1, h2, h3, h4, h5, h6, p, span, div, label, small, strong, b, i, em {
            color: #00ff00 !important;
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-left: 3px solid #00ff00;
            padding-left: 12px;
        }

        h3 {
            font-size: 1rem;
            margin: 15px 0 8px 0;
        }

        .card {
            background: #000000;
            border: 1px solid #00ff00;
            border-radius: 6px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.1), 0 2px 5px rgba(0,0,0,0.5);
        }

        input, button {
            width: 100%;
            padding: 12px 14px;
            margin-top: 10px;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: 'Share Tech Mono', monospace;
            font-weight: normal;
            transition: all 0.2s;
            background: #000000;
        }

        input {
            background: #000000;
            color: #00ff00 !important;
            outline: none;
            border: 1px solid #00ff00;
        }
        input:focus {
            border-color: #00ff00;
            background: #000000;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
            color: #00ff00 !important;
        }
        input::placeholder {
            color: #006600 !important;
        }

        button {
            background: #000000;
            color: #00ff00 !important;
            border: 1px solid #00ff00;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover {
            background: #00ff00;
            color: #000000 !important;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            transform: translateY(-1px);
        }
        button:hover * {
            color: #000000 !important;
        }

        .btn-secondary {
            background: #000000;
            border-color: #006600;
        }
        .btn-secondary:hover {
            background: #006600;
            color: #000000 !important;
        }
        .btn-danger {
            background: #000000;
            border-color: #ff0000;
        }
        .btn-danger:hover {
            background: #ff0000;
            color: #000000 !important;
            border-color: #ff0000;
        }
        .btn-success {
            background: #000000;
            border-color: #00ff00;
        }
        .btn-success:hover {
            background: #00ff00;
            color: #000000 !important;
        }
        .btn-warning {
            background: #000000;
            border-color: #ffff00;
        }
        .btn-warning:hover {
            background: #ffff00;
            color: #000000 !important;
        }

        .error-msg {
            color: #00ff00 !important;
            background: #000000;
            border: 1px solid #00ff00;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 10px;
            text-align: center;
        }

        .success-msg {
            color: #00ff00 !important;
            background: #000000;
            border: 1px solid #00ff00;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 10px;
            text-align: center;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        .search-bar input {
            flex: 1;
            margin-top: 0;
        }
        .search-bar button {
            width: auto;
            padding: 10px 18px;
            margin-top: 0;
        }

        .data-row {
            background: #000000;
            border: 1px solid #00ff00;
            border-radius: 4px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-left: 3px solid #00ff00;
            transition: all 0.2s;
        }
        .data-row:hover {
            background: #0a0a0a;
            transform: translateX(4px);
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
        }
        .data-row strong {
            color: #00ff00 !important;
            font-weight: bold;
        }

        .inline-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .inline-buttons button {
            flex: 1;
            margin-top: 0;
            padding: 8px 12px;
            font-size: 0.8rem;
        }

        hr {
            margin: 15px 0;
            border-color: #00ff00;
            border-style: solid;
        }

        label {
            color: #00ff00 !important;
            display: block;
            margin-top: 10px;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        small {
            color: #00ff00 !important;
            font-size: 0.65rem;
            display: block;
            margin-top: 8px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border: 2px solid #00ff00;
        }
        .modal-content {
            background: #000000;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            max-width: 450px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }
        .modal-content h3 {
            color: #00ff00 !important;
            margin-bottom: 15px;
        }
        .modal-content p, .modal-content label, .modal-content input {
            color: #00ff00 !important;
        }

        ::selection {
            background: #00ff00;
            color: #000000 !important;
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<script>
    // ==================== BANCO DE DADOS ====================
    function initDB() {
        if (!localStorage.getItem("app_users")) {
            localStorage.setItem("app_users", JSON.stringify([]));
        }
        if (!localStorage.getItem("database_records")) {
            localStorage.setItem("database_records", JSON.stringify([]));
        }
        if (!localStorage.getItem("record_passwords")) {
            localStorage.setItem("record_passwords", JSON.stringify({}));
        }
    }

    function getUsers() {
        return JSON.parse(localStorage.getItem("app_users"));
    }
    function saveUsers(users) {
        localStorage.setItem("app_users", JSON.stringify(users));
    }

    function getDatabaseRecords() {
        return JSON.parse(localStorage.getItem("database_records"));
    }
    function saveDatabaseRecords(records) {
        localStorage.setItem("database_records", JSON.stringify(records));
    }

    function getRecordPasswords() {
        return JSON.parse(localStorage.getItem("record_passwords"));
    }
    function saveRecordPasswords(passwords) {
        localStorage.setItem("record_passwords", JSON.stringify(passwords));
    }

    function isValidPassword(pwd) {
        const hasUpper = /[A-Z]/.test(pwd);
        const hasNumber = /[0-9]/.test(pwd);
        const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd);
        return hasUpper && hasNumber && hasSpecial;
    }

    function hashPassword(pwd) {
        return btoa(pwd + "dataAppSalt2025");
    }

    function verifyPassword(plain, storedHash) {
        return hashPassword(plain) === storedHash;
    }

    function registerAccount(nome, senha) {
        let users = getUsers();
        if (users.find(u => u.nome.toLowerCase() === nome.toLowerCase())) {
            return { success: false, message: "[ERRO] USUARIO JA EXISTE" };
        }
        if (!isValidPassword(senha)) {
            return { success: false, message: "[ERRO] SENHA DEVE CONTER: MAIUSCULA, NUMERO E CARACTERE ESPECIAL" };
        }
        users.push({ nome: nome, senhaHash: hashPassword(senha) });
        saveUsers(users);
        return { success: true, message: "[OK] CONTA CRIADA COM SUCESSO" };
    }

    function loginAccount(nome, senha) {
        let users = getUsers();
        const user = users.find(u => u.nome.toLowerCase() === nome.toLowerCase());
        if (!user) return { success: false, message: "[ERRO] USUARIO NAO ENCONTRADO" };
        if (!verifyPassword(senha, user.senhaHash)) return { success: false, message: "[ERRO] SENHA INCORRETA" };
        return { success: true, message: "[OK] ACESSO PERMITIDO", user: user };
    }

    function resetPassword(username, newPassword, confirmPassword) {
        if (newPassword !== confirmPassword) {
            return { success: false, message: "[ERRO] AS SENHAS NAO COINCIDEM" };
        }
        if (!isValidPassword(newPassword)) {
            return { success: false, message: "[ERRO] SENHA DEVE CONTER: MAIUSCULA, NUMERO E CARACTERE ESPECIAL" };
        }
        let users = getUsers();
        const userIndex = users.findIndex(u => u.nome === username);
        if (userIndex === -1) return { success: false, message: "[ERRO] USUARIO NAO ENCONTRADO" };
        
        users[userIndex].senhaHash = hashPassword(newPassword);
        saveUsers(users);
        return { success: true, message: "[OK] SENHA REDEFINIDA COM SUCESSO" };
    }

    function changeAccountPassword(username, oldPassword, newPassword) {
        let users = getUsers();
        const userIndex = users.findIndex(u => u.nome === username);
        if (userIndex === -1) return { success: false, message: "[ERRO] USUARIO NAO ENCONTRADO" };
        
        if (!verifyPassword(oldPassword, users[userIndex].senhaHash)) {
            return { success: false, message: "[ERRO] SENHA ANTIGA INCORRETA" };
        }
        if (!isValidPassword(newPassword)) {
            return { success: false, message: "[ERRO] NOVA SENHA INVALIDA" };
        }
        
        users[userIndex].senhaHash = hashPassword(newPassword);
        saveUsers(users);
        return { success: true, message: "[OK] SENHA ALTERADA COM SUCESSO" };
    }

    function addDatabaseRecord(record) {
        let records = getDatabaseRecords();
        if (records.find(r => r.nomeCompleto.toLowerCase() === record.nomeCompleto.toLowerCase())) {
            return { success: false, message: "[ERRO] REGISTRO JA EXISTE" };
        }
        records.push(record);
        saveDatabaseRecords(records);
        return { success: true, message: "[OK] REGISTRO ADICIONADO" };
    }

    function updateDatabaseRecord(nomeOriginal, novosDados) {
        let records = getDatabaseRecords();
        const index = records.findIndex(r => r.nomeCompleto === nomeOriginal);
        if (index !== -1) {
            records[index] = { ...records[index], ...novosDados };
            saveDatabaseRecords(records);
            return true;
        }
        return false;
    }

    function setRecordPassword(loginName, recordName, password) {
        const passwords = getRecordPasswords();
        const key = `${loginName}_${recordName}`;
        passwords[key] = password;
        saveRecordPasswords(passwords);
    }

    function verifyRecordPassword(loginName, recordName, password) {
        const passwords = getRecordPasswords();
        const key = `${loginName}_${recordName}`;
        return passwords[key] === password;
    }

    function hasRecordPassword(loginName, recordName) {
        const passwords = getRecordPasswords();
        const key = `${loginName}_${recordName}`;
        return !!passwords[key];
    }

    // ==================== ESTADOS ====================
    let currentView = "loginRegister";
    let loggedUser = null;

    const root = document.getElementById("appRoot");

    function getAsciiHeader() {
        return `
        <div class="ascii-header">
  ██╗  ██╗ █████╗  ██████╗██╗  ██╗███████╗██████╗ 
  ██║  ██║██╔══██╗██╔════╝██║ ██╔╝██╔════╝██╔══██╗
  ███████║███████║██║     █████╔╝ █████╗  ██████╔╝
  ██╔══██║██╔══██║██║     ██╔═██╗ ██╔══╝  ██╔══██╗
  ██║  ██║██║  ██║╚██████╗██║  ██╗███████╗██║  ██║
  ╚═╝  ╚═╝╚═╝  ╚═╝ ╚═════╝╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝
        </div>
        <div style="text-align:center; margin-bottom:15px;">
[ DATABASE v1.0 ] - [ SECURE TERMINAL ]
        </div>
        `;
    }

    function render() {
        if (currentView === "loginRegister") {
            renderLoginRegister();
        } else if (currentView === "mainApp") {
            renderMainApp();
        } else if (currentView === "visualizar") {
            renderVisualizar();
        } else if (currentView === "editar") {
            renderEditar();
        } else if (currentView === "changePassword") {
            renderChangePassword();
        } else if (currentView === "forgotPassword") {
            renderForgotPassword();
        }
    }

    function renderLoginRegister() {
        root.innerHTML = `
            ${getAsciiHeader()}
            <div class="card">
                <h2>> ACESSO AO SISTEMA</h2>
                <input type="text" id="loginNome" placeholder="USUARIO">
                <input type="password" id="loginSenha" placeholder="SENHA">
                <button id="btnLogin">[ ENTRAR ]</button>
                <button id="btnForgotPass" class="btn-warning">[ ESQUECI A SENHA ]</button>
                <div id="loginMsg" class="error-msg" style="display:none;"></div>
                <hr>
                <h3>> CRIAR CONTA</h3>
                <input type="text" id="regNome" placeholder="USUARIO">
                <input type="password" id="regSenha" placeholder="SENHA">
                <button id="btnRegister">[ REGISTRAR ]</button>
                <div id="regMsg" class="error-msg" style="display:none;"></div>
                <small>REQUISITOS: 1 MAIUSCULA, 1 NUMERO, 1 CARACTERE ESPECIAL | EX: Admin@123</small>
            </div>
        `;
        
        document.getElementById("btnLogin").addEventListener("click", () => {
            const nome = document.getElementById("loginNome").value.trim();
            const senha = document.getElementById("loginSenha").value;
            const msgDiv = document.getElementById("loginMsg");
            if (!nome || !senha) {
                msgDiv.style.display = "block"; msgDiv.innerText = "[ERRO] PREENCHA TODOS OS CAMPOS";
                return;
            }
            const result = loginAccount(nome, senha);
            if (result.success) {
                loggedUser = { nome: result.user.nome };
                currentView = "mainApp";
                render();
            } else {
                msgDiv.style.display = "block"; msgDiv.innerText = result.message;
            }
        });
        
        document.getElementById("btnRegister").addEventListener("click", () => {
            const nome = document.getElementById("regNome").value.trim();
            const senha = document.getElementById("regSenha").value;
            const msgDiv = document.getElementById("regMsg");
            if (!nome || !senha) {
                msgDiv.style.display = "block"; msgDiv.innerText = "[ERRO] PREENCHA TODOS OS CAMPOS";
                return;
            }
            const result = registerAccount(nome, senha);
            if (result.success) {
                msgDiv.classList.add("success-msg");
                msgDiv.classList.remove("error-msg");
                msgDiv.style.display = "block"; msgDiv.innerText = result.message;
                setTimeout(() => { msgDiv.style.display = "none"; }, 2000);
            } else {
                msgDiv.classList.add("error-msg");
                msgDiv.classList.remove("success-msg");
                msgDiv.style.display = "block"; msgDiv.innerText = result.message;
            }
        });
        
        document.getElementById("btnForgotPass").addEventListener("click", () => {
            currentView = "forgotPassword";
            render();
        });
    }

    function renderForgotPassword() {
        root.innerHTML = `
            ${getAsciiHeader()}
            <div>
                <button id="backToLogin" class="btn-secondary">[ VOLTAR ]</button>
                <div class="card">
                    <h2>> RECUPERAR SENHA</h2>
                    <label>USUARIO:</label>
                    <input type="text" id="resetUsername" placeholder="NOME DE USUARIO">
                    <label>NOVA SENHA:</label>
                    <input type="password" id="resetNewPass" placeholder="NOVA SENHA">
                    <label>CONFIRMAR SENHA:</label>
                    <input type="password" id="resetConfirmPass" placeholder="CONFIRMAR SENHA">
                    <button id="btnResetPass">[ REDEFINIR SENHA ]</button>
                    <div id="resetMsg" class="error-msg" style="display:none;"></div>
                    <small>A NOVA SENHA DEVE CONTER: 1 MAIUSCULA, 1 NUMERO, 1 CARACTERE ESPECIAL</small>
                </div>
            </div>
        `;
        
        document.getElementById("btnResetPass").addEventListener("click", () => {
            const username = document.getElementById("resetUsername").value.trim();
            const newPass = document.getElementById("resetNewPass").value;
            const confirmPass = document.getElementById("resetConfirmPass").value;
            const msgDiv = document.getElementById("resetMsg");
            
            if (!username || !newPass || !confirmPass) {
                msgDiv.style.display = "block"; msgDiv.innerText = "[ERRO] PREENCHA TODOS OS CAMPOS";
                return;
            }
            
            const result = resetPassword(username, newPass, confirmPass);
            if (result.success) {
                msgDiv.classList.add("success-msg");
                msgDiv.classList.remove("error-msg");
                msgDiv.style.display = "block"; msgDiv.innerText = result.message;
                setTimeout(() => {
                    currentView = "loginRegister";
                    render();
                }, 2000);
            } else {
                msgDiv.classList.add("error-msg");
                msgDiv.classList.remove("success-msg");
                msgDiv.style.display = "block"; msgDiv.innerText = result.message;
            }
        });
        
        document.getElementById("backToLogin").addEventListener("click", () => {
            currentView = "loginRegister";
            render();
        });
    }

    function renderChangePassword() {
        if (!loggedUser) {
            currentView = "loginRegister";
            render();
            return;
        }
        
        root.innerHTML = `
            ${getAsciiHeader()}
            <div>
                <button id="backToMain" class="btn-secondary">[ VOLTAR ]</button>
                <div class="card">
                    <h2>> ALTERAR SENHA</h2>
                    <label>SENHA ANTIGA:</label>
                    <input type="password" id="oldPassword" placeholder="SENHA ATUAL">
                    <label>NOVA SENHA:</label>
                    <input type="password" id="newPassword" placeholder="NOVA SENHA">
                    <label>CONFIRMAR NOVA SENHA:</label>
                    <input type="password" id="confirmPassword" placeholder="CONFIRMAR SENHA">
                    <button id="btnConfirmChange">[ ALTERAR ]</button>
                    <div id="changeMsg" class="error-msg" style="display:none;"></div>
                    <small>REQUISITOS: 1 MAIUSCULA, 1 NUMERO, 1 CARACTERE ESPECIAL</small>
                </div>
            </div>
        `;
        
        document.getElementById("btnConfirmChange").addEventListener("click", () => {
            const oldPassword = document.getElementById("oldPassword").value;
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const msgDiv = document.getElementById("changeMsg");
            
            if (!oldPassword || !newPassword || !confirmPassword) {
                msgDiv.style.display = "block"; msgDiv.innerText = "[ERRO] PREENCHA TODOS OS CAMPOS";
                return;
            }
            if (newPassword !== confirmPassword) {
                msgDiv.style.display = "block"; msgDiv.innerText = "[ERRO] AS SENHAS NAO COINCIDEM";
                return;
            }
            
            const result = changeAccountPassword(loggedUser.nome, oldPassword, newPassword);
            if (result.success) {
                msgDiv.classList.add("success-msg");
                msgDiv.classList.remove("error-msg");
                msgDiv.style.display = "block"; msgDiv.innerText = result.message;
                setTimeout(() => {
                    currentView = "mainApp";
                    render();
                }, 2000);
            } else {
                msgDiv.classList.add("error-msg");
                msgDiv.classList.remove("success-msg");
                msgDiv.style.display = "block"; msgDiv.innerText = result.message;
            }
        });
        
        document.getElementById("backToMain").addEventListener("click", () => {
            currentView = "mainApp";
            render();
        });
    }

    function renderMainApp() {
        if (!loggedUser) {
            currentView = "loginRegister";
            render();
            return;
        }
        root.innerHTML = `
            ${getAsciiHeader()}
            <div class="user-name">[ ${loggedUser.nome.toUpperCase()} ]</div>
            <div class="card">
                <button id="btnVisualizar">[ VISUALIZAR REGISTROS ]</button>
                <button id="btnEditar" class="btn-secondary">[ EDITAR / GERENCIAR ]</button>
                <button id="btnChangeMyPassword" class="btn-warning">[ ALTERAR SENHA ]</button>
                <button id="btnLogout" class="btn-danger">[ SAIR ]</button>
            </div>
        `;
        document.getElementById("btnVisualizar").addEventListener("click", () => {
            currentView = "visualizar";
            render();
        });
        document.getElementById("btnEditar").addEventListener("click", () => {
            currentView = "editar";
            render();
        });
        document.getElementById("btnChangeMyPassword").addEventListener("click", () => {
            currentView = "changePassword";
            render();
        });
        document.getElementById("btnLogout").addEventListener("click", () => {
            loggedUser = null;
            currentView = "loginRegister";
            render();
        });
    }

    function renderVisualizar() {
        let records = getDatabaseRecords();
        
        function filterRecords(searchTerm) {
            if (!searchTerm) return records;
            return records.filter(r => r.nomeCompleto.toLowerCase().includes(searchTerm.toLowerCase()));
        }
        
        function refreshList(searchTerm = "") {
            const filtered = filterRecords(searchTerm);
            const container = document.getElementById("recordsList");
            if (!container) return;
            if (filtered.length === 0) {
                container.innerHTML = `<div class="error-msg">[ NENHUM REGISTRO ENCONTRADO ]</div>`;
                return;
            }
            container.innerHTML = filtered.map(rec => `
                <div class="data-row">
                    <strong>> ${escapeHtml(rec.nomeCompleto)}</strong><br>
                    [DATA] ${escapeHtml(rec.dataNascimento || "---")} | [CPF] ${escapeHtml(rec.cpf || "---")}<br>
                    [TEL] ${escapeHtml(rec.telefone || "---")} | [EMAIL] ${escapeHtml(rec.gmail || "---")}<br>
                    [END] ${escapeHtml(rec.rua || "---")}, ${escapeHtml(rec.numeroCasa || "---")}<br>
                    [CEP] ${escapeHtml(rec.cep || "---")} | [CNPJ] ${escapeHtml(rec.cnpj || "---")}
                </div>
            `).join("");
        }
        
        root.innerHTML = `
            ${getAsciiHeader()}
            <div>
                <button id="backMain" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> REGISTROS DO BANCO</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="PESQUISAR POR NOME...">
                    <button id="searchBtn">[ BUSCAR ]</button>
                </div>
                <div id="recordsList"></div>
            </div>
        `;
        
        refreshList("");
        document.getElementById("searchBtn").addEventListener("click", () => {
            refreshList(document.getElementById("searchInput").value);
        });
        document.getElementById("backMain").addEventListener("click", () => {
            currentView = "mainApp";
            render();
        });
    }

    function renderEditar() {
        if (!loggedUser) {
            currentView = "loginRegister";
            render();
            return;
        }
        
        const records = getDatabaseRecords();
        
        root.innerHTML = `
            ${getAsciiHeader()}
            <div>
                <button id="backToMain" class="btn-secondary">[ VOLTAR ]</button>
                <h2>> GERENCIAR REGISTROS</h2>
                
                <div class="card">
                    <h3>[ NOVO REGISTRO ]</h3>
                    <input type="text" id="newNome" placeholder="NOME COMPLETO *">
                    <input type="date" id="newDataNasc" placeholder="DATA NASC">
                    <input type="text" id="newCpf" placeholder="CPF">
                    <input type="text" id="newCep" placeholder="CEP">
                    <input type="text" id="newCnpj" placeholder="CNPJ">
                    <input type="text" id="newRua" placeholder="RUA">
                    <input type="text" id="newNumero" placeholder="NUMERO">
                    <input type="text" id="newTelefone" placeholder="TELEFONE">
                    <input type="email" id="newGmail" placeholder="GMAIL">
                    <button id="btnAddRecord" class="btn-success">[ SALVAR ]</button>
                    <div id="addMsg" style="display:none;"></div>
                </div>
                
                <div class="card">
                    <h3>[ PESQUISAR PARA EDITAR ]</h3>
                    <div class="search-bar">
                        <input type="text" id="searchRecordInput" placeholder="NOME DA PESSOA...">
                        <button id="searchRecordBtn">[ BUSCAR ]</button>
                    </div>
                    <div id="searchResults"></div>
                </div>
            </div>
        `;
        
        document.getElementById("btnAddRecord").addEventListener("click", () => {
            const nomeCompleto = document.getElementById("newNome").value.trim();
            if (!nomeCompleto) {
                showMsg("addMsg", "[ERRO] NOME OBRIGATORIO", "error");
                return;
            }
            
            const newRecord = {
                nomeCompleto: nomeCompleto,
                dataNascimento: document.getElementById("newDataNasc").value,
                cpf: document.getElementById("newCpf").value,
                cep: document.getElementById("newCep").value,
                cnpj: document.getElementById("newCnpj").value,
                rua: document.getElementById("newRua").value,
                numeroCasa: document.getElementById("newNumero").value,
                telefone: document.getElementById("newTelefone").value,
                gmail: document.getElementById("newGmail").value
            };
            
            const result = addDatabaseRecord(newRecord);
            if (result.success) {
                showMsg("addMsg", result.message, "success");
                document.querySelectorAll("#newNome, #newDataNasc, #newCpf, #newCep, #newCnpj, #newRua, #newNumero, #newTelefone, #newGmail").forEach(input => {
                    if(input.id !== "newNome") input.value = "";
                });
                document.getElementById("newNome").value = "";
            } else {
                showMsg("addMsg", result.message, "error");
            }
        });
        
        function searchRecords() {
            const searchTerm = document.getElementById("searchRecordInput").value.trim().toLowerCase();
            if (!searchTerm) {
                document.getElementById("searchResults").innerHTML = '<div class="error-msg">[ DIGITE UM NOME ]</div>';
                return;
            }
            
            const found = records.filter(r => r.nomeCompleto.toLowerCase().includes(searchTerm));
            const resultsDiv = document.getElementById("searchResults");
            
            if (found.length === 0) {
                resultsDiv.innerHTML = '<div class="error-msg">[ NENHUM REGISTRO ENCONTRADO ]</div>';
                return;
            }
            
            resultsDiv.innerHTML = found.map(rec => `
                <div class="data-row">
                    <strong>> ${escapeHtml(rec.nomeCompleto)}</strong><br>
                    [DATA] ${escapeHtml(rec.dataNascimento || "---")} | [CPF] ${escapeHtml(rec.cpf || "---")}
                    <div class="inline-buttons">
                        <button class="edit-record" data-nome="${escapeHtml(rec.nomeCompleto)}">[ EDITAR ]</button>
                    </div>
                </div>
            `).join("");
            
            document.querySelectorAll(".edit-record").forEach(btn => {
                btn.addEventListener("click", () => {
                    const nome = btn.getAttribute("data-nome");
                    promptEditPassword(nome);
                });
            });
        }
        
        document.getElementById("searchRecordBtn").addEventListener("click", searchRecords);
        document.getElementById("backToMain").addEventListener("click", () => {
            currentView = "mainApp";
            render();
        });
    }
    
    function promptEditPassword(recordName) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>> AUTORIZACAO NECESSARIA</h3>
                <p>REGISTRO: <strong>${escapeHtml(recordName)}</strong></p>
                ${!hasRecordPassword(loggedUser.nome, recordName) ? 
                    '<p>CRIAR SENHA DE 4 DIGITOS:</p>' : 
                    '<p>DIGITE A SENHA DE 4 DIGITOS:</p>'}
                <input type="password" id="editPassword" maxlength="4" placeholder="SENHA (4 DIGITOS)">
                <div class="inline-buttons">
                    <button id="confirmEditPass">[ CONFIRMAR ]</button>
                    <button id="cancelEditPass" class="btn-secondary">[ CANCELAR ]</button>
                </div>
                <div id="passMsg" class="error-msg" style="display:none;"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById("confirmEditPass").addEventListener("click", () => {
            const password = document.getElementById("editPassword").value;
            const msgDiv = document.getElementById("passMsg");
            
            if (!/^\d{4}$/.test(password)) {
                msgDiv.style.display = "block";
                msgDiv.innerText = "[ERRO] SENHA DEVE TER 4 DIGITOS NUMERICOS";
                return;
            }
            
            if (!hasRecordPassword(loggedUser.nome, recordName)) {
                setRecordPassword(loggedUser.nome, recordName, password);
                modal.remove();
                openEditForm(recordName);
            } else {
                if (verifyRecordPassword(loggedUser.nome, recordName, password)) {
                    modal.remove();
                    openEditForm(recordName);
                } else {
                    msgDiv.style.display = "block";
                    msgDiv.innerText = "[ERRO] SENHA INCORRETA";
                }
            }
        });
        
        document.getElementById("cancelEditPass").addEventListener("click", () => {
            modal.remove();
        });
    }
    
    function openEditForm(recordName) {
        const record = getDatabaseRecords().find(r => r.nomeCompleto === recordName);
        if (!record) return;
        
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>> EDITANDO: ${escapeHtml(recordName)}</h3>
                <label>NOME COMPLETO:</label>
                <input type="text" id="editNome" value="${escapeHtml(record.nomeCompleto)}">
                <label>DATA NASC:</label>
                <input type="date" id="editDataNasc" value="${record.dataNascimento || ''}">
                <label>CPF:</label>
                <input type="text" id="editCpf" value="${escapeHtml(record.cpf || '')}">
                <label>CEP:</label>
                <input type="text" id="editCep" value="${escapeHtml(record.cep || '')}">
                <label>CNPJ:</label>
                <input type="text" id="editCnpj" value="${escapeHtml(record.cnpj || '')}">
                <label>RUA:</label>
                <input type="text" id="editRua" value="${escapeHtml(record.rua || '')}">
                <label>NUMERO:</label>
                <input type="text" id="editNumero" value="${escapeHtml(record.numeroCasa || '')}">
                <label>TELEFONE:</label>
                <input type="text" id="editTelefone" value="${escapeHtml(record.telefone || '')}">
                <label>GMAIL:</label>
                <input type="email" id="editGmail" value="${escapeHtml(record.gmail || '')}">
                <div class="inline-buttons">
                    <button id="saveEditBtn" class="btn-success">[ SALVAR ]</button>
                    <button id="closeEditBtn" class="btn-secondary">[ FECHAR ]</button>
                </div>
                <div id="editMsg" style="display:none;"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById("saveEditBtn").addEventListener("click", () => {
            const newNome = document.getElementById("editNome").value.trim();
            if (!newNome) {
                showMsgInModal("editMsg", "[ERRO] NOME OBRIGATORIO", "error");
                return;
            }
            
            const updatedData = {
                nomeCompleto: newNome,
                dataNascimento: document.getElementById("editDataNasc").value,
                cpf: document.getElementById("editCpf").value,
                cep: document.getElementById("editCep").value,
                cnpj: document.getElementById("editCnpj").value,
                rua: document.getElementById("editRua").value,
                numeroCasa: document.getElementById("editNumero").value,
                telefone: document.getElementById("editTelefone").value,
                gmail: document.getElementById("editGmail").value
            };
            
            updateDatabaseRecord(recordName, updatedData);
            showMsgInModal("editMsg", "[OK] DADOS ATUALIZADOS", "success");
            setTimeout(() => modal.remove(), 1500);
        });
        
        document.getElementById("closeEditBtn").addEventListener("click", () => {
            modal.remove();
        });
    }
    
    function showMsg(elementId, message, type) {
        const el = document.getElementById(elementId);
        el.style.display = "block";
        el.className = type === "success" ? "success-msg" : "error-msg";
        el.innerText = message;
        setTimeout(() => { el.style.display = "none"; }, 2000);
    }
    
    function showMsgInModal(elementId, message, type) {
        const el = document.getElementById(elementId);
        if (!el) return;
        el.style.display = "block";
        el.className = type === "success" ? "success-msg" : "error-msg";
        el.innerText = message;
        setTimeout(() => { el.style.display = "none"; }, 2000);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    initDB();
    render();
</script>
</body>
</html>
